name: Orçamento Atividades

on:
  schedule:
    # Horário do GitHub Actions é UTC
    # 07:00 BRT -> 10:00 UTC
    # 12:00 BRT -> 15:00 UTC
    # 15:00 BRT -> 18:00 UTC
    # 18:00 BRT -> 21:00 UTC
    - cron: "0 10,15,18,21 * * *"
  workflow_dispatch:

# Evita duas execuções gravando no mesmo destino ao mesmo tempo
# (agendada + manual sobrepostas corromperiam o paste). Enfileira, não cancela.
concurrency:
  group: orcamento-atividades
  cancel-in-progress: false

jobs:
  orcamento-atividades:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependências
        run: |
          pip install -r requirements.txt

      # 🔑 Aqui é o pulo do gato: grava o JSON exatamente como está no secret
      - name: Criar credenciais.json
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          printf '%s' "$GOOGLE_CREDENTIALS" > credenciais.json

      - name: Executar orcamento_atividades.py
        run: |
          python orcamento_atividades.py
